name: CI
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main
jobs:
  Dockerfile-linter:
    name: Check Dockerfiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
  go-linters:
    name: Go linters
    runs-on: ubuntu-24.04
    steps:
      - name: Set up Go 1.x
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
      - name: Check out code into the Go module directory
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: -exclude-generated ./...
        env:
          GOROOT: ""
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          args: --timeout=10m
          only-new-issues: true
      - uses: dominikh/staticcheck-action@v1.4.0
        with:
          version: "latest"
          install-go: false
          skip-cache: true
  go:
    name: Check sources
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
    steps:
      - name: Set up Go 1.x
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
      - name: Check out code into the Go module directory
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Cache go modules
        id: cache-mod
        uses: actions/cache@v6
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Download dependencies
        run: go mod download
        if: steps.cache-mod.outputs.cache-hit != 'true'
      - name: Check go mod status
        run: |
          time_before=$(date "+%F %T")
          go mod tidy
          if [[ $(find . -type f -newermt "$time_before") ]]
          then
            echo "Go mod state is not clean:"
            find . -type f -newermt "$time_before"
            exit 1
          fi
      - name: Check format
        run: |
          unformatted=$(gofmt -s -l .)
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            exit 1
          fi
      - name: Run Go Tests
        run: |
          go test -v -coverprofile=coverage.out ./pkg/handlers/... ./pkg/middleware/... ./pkg/utils/...
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          use_oidc: true
          flags: unit-tests
          files: coverage.out
  gitlint:
    if: github.event_name == 'pull_request'
    name: Run gitlint checks
    runs-on: ubuntu-24.04
    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Install gitlint into container
        run: python -m pip install gitlint
      - name: Run gitlint check
        run: gitlint --commits origin/${{ github.event.pull_request.base.ref }}..HEAD